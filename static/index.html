<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas Hold'em Poker</title>
    <link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body>

<!-- Setup Screen -->
<div id="setup-screen">
    <div class="setup-box">
        <h1>Texas Hold'em</h1>
        <h2>Online Poker</h2>

        <div class="setup-field">
            <label>Your Name</label>
            <input type="text" id="player-name" value="Player" maxlength="20">
        </div>

        <div class="setup-field">
            <label>Number of Players <span class="range-value" id="num-players-val">6</span></label>
            <input type="range" id="num-players" min="2" max="8" value="6">
        </div>

        <div class="setup-field">
            <label>Starting Chips</label>
            <input type="number" id="starting-chips" value="1000" min="100" step="100">
        </div>

        <div class="setup-field">
            <label>Small Blind</label>
            <input type="number" id="small-blind" value="10" min="5" step="5">
        </div>

        <button id="start-btn">Deal Me In</button>
    </div>
</div>

<!-- Game Area -->
<div id="game-area">
    <div id="info-bar">Waiting...</div>

    <div id="table">
        <div id="community-area"></div>
        <div id="pot-display">Pot: $0</div>
        <div id="chip-layer"></div>
    </div>

    <!-- Announcement overlay -->
    <div id="announcement" class="hidden"></div>

    <!-- Game Over overlay -->
    <div id="game-over" class="hidden">
        <div class="game-over-box">
            <h1>Game Over</h1>
            <p></p>
            <button id="play-again-btn" onclick="playAgain()">Play Again</button>
        </div>
    </div>
</div>

<!-- GTO Panel -->
<div id="gto-panel" class="hidden">
    <div class="gto-header">
        <h3>GTO Advisor</h3>
    </div>
    <div id="gto-content"></div>
</div>

<!-- Controls -->
<div id="controls" class="hidden">
    <button class="ctrl-btn" id="fold-btn" onclick="doFold()">Fold</button>
    <button class="ctrl-btn" id="check-btn" onclick="doCheck()">Check</button>
    <button class="ctrl-btn" id="call-btn" onclick="doCall()" style="display:none">Call</button>
    <div id="raise-slider-area">
        <input type="range" id="raise-amount" min="0" max="1000" value="0">
        <span id="raise-value">$0</span>
    </div>
    <button class="ctrl-btn" id="raise-btn" onclick="doRaise()">Raise</button>
</div>

<script src="/static/app.js?v=7"></script>
</body>
</html>
